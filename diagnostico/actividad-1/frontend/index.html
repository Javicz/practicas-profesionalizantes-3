<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Stock - Planta de Reciclaje</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>📦 Stock de Materiales - Planta de Reciclaje</h1>
        
        <!-- Tabla de materiales -->
        <div class="table-container">
            <table id="materiales-table">
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Unidad</th>
                        <th>Cantidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="materiales-body">
                    <tr>
                        <td colspan="4" style="text-align: center;">Cargando materiales...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Formulario para nuevo material -->
        <div class="form-section">
            <h2>➕ Agregar Nuevo Material</h2>
            <form id="nuevo-material-form">
                <div class="form-group">
                    <label for="nombre">Nombre del material:</label>
                    <input type="text" id="nombre" placeholder="Ej: Plástico PET" required>
                </div>
                <div class="form-group">
                    <label for="unidad">Unidad de medida:</label>
                    <select id="unidad" required>
                        <option value="">Seleccionar unidad</option>
                        <option value="kg">kg (kilogramos)</option>
                        <option value="m³">m³ (metros cúbicos)</option>
                        <option value="unidades">unidades</option>
                    </select>
                </div>
                <button type="submit">Agregar Material</button>
            </form>
        </div>

        <!-- Formulario para compra/venta -->
        <div class="form-section">
            <h2>🔄 Registrar Operación</h2>
            <form id="operacion-form">
                <div class="form-group">
                    <label for="material-id">Material:</label>
                    <select id="material-id" required>
                        <option value="">Seleccionar material</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="cantidad">Cantidad:</label>
                    <input type="number" id="cantidad" step="any" placeholder="Ingrese la cantidad" required>
                </div>
                <div class="form-group">
                    <label for="tipo-operacion">Tipo de operación:</label>
                    <select id="tipo-operacion" required>
                        <option value="">Seleccionar tipo</option>
                        <option value="compra">📥 Compra (aumentar stock)</option>
                        <option value="venta">📤 Venta (disminuir stock)</option>
                    </select>
                </div>
                <button type="submit">Registrar Operación</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
