<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDK/V3 - Frontend (DOM API)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
var API_URL = ''; // Relativo (mismo servidor)

// ============================================================
// FUNCIÓN RPCWebAPIFetch (Requerimiento 1)
// ============================================================
async function RPCWebAPIFetch(name, content, method) {
    method = method || 'POST';
    var headers, options, response, data;

    headers = {
        'Content-Type': 'application/x-www-form-urlencoded'
    };

    options = {
        method: method,
        headers: headers
    };

    if (content) {
        options.body = new URLSearchParams(content).toString();
    }

    response = await fetch(name, options);

    try {
        data = await response.json();
    } catch (e) {
        throw new Error('La respuesta no es JSON válido');
    }

    if (response.ok) {
        return data;
    } else if (response.status === 400) {
        throw new Error(data.exception || 'Error en la solicitud (400)');
    } else if (response.status === 401) {
        throw new Error(data.exception || 'No autenticado (401)');
    } else if (response.status === 403) {
        throw new Error(data.exception || 'Acceso denegado (403)');
    } else if (response.status === 404) {
        throw new Error(data.exception || 'Método no encontrado (404)');
    } else if (response.status === 422) {
        throw new Error(data.exception || 'Error de negocio (422)');
    } else if (response.status === 500) {
        throw new Error(data.exception || 'Error interno del servidor (500)');
    } else {
        throw new Error('Error inesperado (' + response.status + ')');
    }
}

// ============================================================
// UI CON DOM API
// ============================================================
function createElement(tag, attributes, children) {
    var el, key, child;
    
    el = document.createElement(tag);
    
    if (attributes) {
        for (key in attributes) {
            if (key === 'className') {
                el.className = attributes[key];
            } else if (key === 'textContent') {
                el.textContent = attributes[key];
            } else if (key === 'style') {
                for (var styleKey in attributes.style) {
                    el.style[styleKey] = attributes.style[styleKey];
                }
            } else {
                el.setAttribute(key, attributes[key]);
            }
        }
    }
    
    if (children) {
        for (var i = 0; i < children.length; i++) {
            child = children[i];
            if (typeof child === 'string') {
                el.appendChild(document.createTextNode(child));
            } else {
                el.appendChild(child);
            }
        }
    }
    
    return el;
}

function buildUI() {
    var container, title, subtitle, infoBox, statusBar, sections, loginSection, registerSection, endpointsSection, outputSection;
    
    container = document.createElement('div');
    container.className = 'container';
    
    // Título
    title = document.createElement('h1');
    title.textContent = '🔐 SDK/V3 - Sistema de Autenticación';
    container.appendChild(title);
    
    // Info Box
    infoBox = createElement('div', { className: 'info-box' }, [
        createElement('strong', { textContent: '📌 Usuario de prueba:' }),
        document.createElement('br'),
        document.createTextNode('👤 '),
        createElement('code', { textContent: 'usuarioX' }),
        document.createTextNode(' | 🔑 '),
        createElement('code', { textContent: '123456' }),
        document.createElement('br'),
        createElement('span', { style: { color: '#28a745' }, textContent: '✅ Permisos: /print /log /help' }),
        document.createElement('br'),
        createElement('span', { style: { color: '#dc3545' }, textContent: '❌ Sin permisos: /sayHello /sayBye' })
    ]);
    container.appendChild(infoBox);
    
    // Status Bar
    statusBar = createElement('div', { className: 'status-bar' }, [
        createElement('span', { textContent: '👤 ' }),
        createElement('strong', { id: 'statusUser', textContent: 'No autenticado' }),
        createElement('span', { id: 'statusBadge', className: 'badge badge-offline', textContent: 'Sin sesión' })
    ]);
    container.appendChild(statusBar);
    
    // Secciones
    sections = document.createElement('div');
    
    // Login Section
    loginSection = buildLoginSection();
    sections.appendChild(loginSection);
    
    // Register Section
    registerSection = buildRegisterSection();
    sections.appendChild(registerSection);
    
    // Endpoints Section
    endpointsSection = buildEndpointsSection();
    sections.appendChild(endpointsSection);
    
    // Output Section
    outputSection = buildOutputSection();
    sections.appendChild(outputSection);
    
    container.appendChild(sections);
    document.getElementById('app').appendChild(container);
}

function buildLoginSection() {
    var section, title, userGroup, passGroup, btnLogin, btnLogout;
    
    section = createElement('div', { className: 'section' });
    title = createElement('h2', { textContent: '👤 Iniciar Sesión' });
    section.appendChild(title);
    
    userGroup = createFormGroup('Usuario:', 'txtUser', 'text', 'usuarioX');
    passGroup = createFormGroup('Contraseña:', 'txtPassword', 'password', '123456');
    section.appendChild(userGroup);
    section.appendChild(passGroup);
    
    btnLogin = createElement('button', { className: 'btn-primary', id: 'btnLogin', textContent: 'Login' });
    btnLogout = createElement('button', { className: 'btn-danger', id: 'btnLogout', textContent: 'Logout' });
    section.appendChild(btnLogin);
    section.appendChild(btnLogout);
    
    return section;
}

function buildRegisterSection() {
    var section, title, userGroup, passGroup, btnRegister, small;
    
    section = createElement('div', { className: 'section' });
    title = createElement('h2', { textContent: '📝 Registrar Usuario' });
    section.appendChild(title);
    
    userGroup = createFormGroup('Nuevo Usuario:', 'txtNewUser', 'text', 'Nuevo usuario');
    passGroup = createFormGroup('Nueva Pass:', 'txtNewPassword', 'password', 'Nueva contraseña');
    section.appendChild(userGroup);
    section.appendChild(passGroup);
    
    btnRegister = createElement('button', { className: 'btn-success', id: 'btnRegister', textContent: 'Crear Usuario' });
    section.appendChild(btnRegister);
    
    small = createElement('small', { textContent: '🔐 Contraseña cifrada con SHA256' });
    section.appendChild(small);
    
    return section;
}

function buildEndpointsSection() {
    var section, title, grid, endpoints, i, btn;
    
    section = createElement('div', { className: 'section' });
    title = createElement('h2', { textContent: '🔒 Probar Endpoints' });
    section.appendChild(title);
    
    grid = createElement('div', { className: 'endpoint-grid' });
    
    endpoints = [
        { path: 'print', label: '🖨️ /print', className: 'btn-info' },
        { path: 'log', label: '📋 /log', className: 'btn-info' },
        { path: 'help', label: '❓ /help', className: 'btn-info' },
        { path: 'sayHello', label: '👋 /sayHello', className: 'btn-secondary' },
        { path: 'sayBye', label: '👋 /sayBye', className: 'btn-secondary' }
    ];
    
    for (i = 0; i < endpoints.length; i++) {
        btn = createElement('button', {
            className: endpoints[i].className,
            'data-endpoint': endpoints[i].path,
            textContent: endpoints[i].label
        });
        grid.appendChild(btn);
    }
    
    section.appendChild(grid);
    return section;
}

function buildOutputSection() {
    var section, title, output;
    
    section = createElement('div', { className: 'section' });
    title = createElement('h2', { textContent: '📤 Respuesta' });
    section.appendChild(title);
    
    output = document.createElement('pre');
    output.id = 'output';
    output.textContent = 'Esperando acción...';
    output.style.borderLeft = '4px solid #17a2b8';
    section.appendChild(output);
    
    return section;
}

function createFormGroup(labelText, inputId, inputType, placeholder) {
    var group, label, input;
    
    group = createElement('div', { className: 'form-group' });
    label = createElement('label', { textContent: labelText });
    input = createElement('input', { id: inputId, type: inputType, placeholder: placeholder });
    
    if (inputId === 'txtUser') {
        input.setAttribute('value', 'usuarioX');
    }
    if (inputId === 'txtPassword') {
        input.setAttribute('value', '123456');
    }
    
    group.appendChild(label);
    group.appendChild(input);
    return group;
}

// ============================================================
// UI HELPERS
// ============================================================
function showOutput(data, type) {
    var output;
    
    output = document.getElementById('output');
    
    while (output.firstChild) {
        output.removeChild(output.firstChild);
    }
    
    if (typeof data === 'string') {
        output.textContent = data;
    } else {
        output.textContent = JSON.stringify(data, null, 2);
    }
    
    if (type === 'success') {
        output.style.borderLeft = '4px solid #28a745';
    } else if (type === 'error') {
        output.style.borderLeft = '4px solid #dc3545';
    } else {
        output.style.borderLeft = '4px solid #17a2b8';
    }
}

function updateStatus(username) {
    var userEl, badgeEl;
    
    userEl = document.getElementById('statusUser');
    badgeEl = document.getElementById('statusBadge');
    
    if (username) {
        userEl.textContent = username;
        userEl.style.color = '#28a745';
        badgeEl.textContent = '✅ Sesión activa';
        badgeEl.className = 'badge badge-online';
    } else {
        userEl.textContent = 'No autenticado';
        userEl.style.color = '#dc3545';
        badgeEl.textContent = '❌ Sin sesión';
        badgeEl.className = 'badge badge-offline';
    }
}

// ============================================================
// MANEJADORES
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    var btnLogin, btnLogout, btnRegister;
    var currentUser = null;
    
    buildUI();
    
    // ============ LOGIN ============
    btnLogin = document.getElementById('btnLogin');
    btnLogin.addEventListener('click', async function() {
        var username, password;
        
        username = document.getElementById('txtUser').value;
        password = document.getElementById('txtPassword').value;
        
        if (!username || !password) {
            showOutput('❌ Usuario y contraseña son requeridos', 'error');
            return;
        }
        
        try {
            var data = await RPCWebAPIFetch('/login', { username: username, password: password });
            showOutput(data, 'success');
            if (data.success) {
                currentUser = username;
                updateStatus(username);
            }
        } catch (error) {
            showOutput('❌ Error: ' + error.message, 'error');
            currentUser = null;
            updateStatus(null);
        }
    });
    
    // ============ LOGOUT ============
    btnLogout = document.getElementById('btnLogout');
    btnLogout.addEventListener('click', async function() {
        if (!currentUser) {
            showOutput('⚠️ No hay sesión iniciada', 'info');
            return;
        }
        
        try {
            var data = await RPCWebAPIFetch('/logout', { username: currentUser });
            showOutput(data, 'success');
            if (data.success) {
                currentUser = null;
                updateStatus(null);
            }
        } catch (error) {
            showOutput('❌ Error: ' + error.message, 'error');
        }
    });
    
    // ============ REGISTRO ============
    btnRegister = document.getElementById('btnRegister');
    btnRegister.addEventListener('click', async function() {
        var username, password;
        
        username = document.getElementById('txtNewUser').value;
        password = document.getElementById('txtNewPassword').value;
        
        if (!username || !password) {
            showOutput('❌ Usuario y contraseña son requeridos', 'error');
            return;
        }
        
        try {
            var data = await RPCWebAPIFetch('/register', { username: username, password: password });
            showOutput(data, 'success');
            if (data.success) {
                document.getElementById('txtNewUser').value = '';
                document.getElementById('txtNewPassword').value = '';
            }
        } catch (error) {
            showOutput('❌ Error: ' + error.message, 'error');
        }
    });
    
    // ============ ENDPOINTS ============
    document.querySelectorAll('[data-endpoint]').forEach(function(btn) {
        btn.addEventListener('click', async function() {
            var endpoint;
            
            endpoint = this.dataset.endpoint;
            
            if (!currentUser) {
                showOutput('❌ Primero iniciá sesión', 'error');
                return;
            }
            
            try {
                var data = await RPCWebAPIFetch('/' + endpoint + '?username=' + encodeURIComponent(currentUser), null, 'GET');
                showOutput(data, 'success');
            } catch (error) {
                showOutput('❌ Error: ' + error.message, 'error');
            }
        });
    });
    
    // ============ INICIO ============
    updateStatus(null);
    showOutput('💡 Inicia sesión con usuarioX / 123456', 'info');
});
</script>
</body>
</html>
