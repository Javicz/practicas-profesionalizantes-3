<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<div id="app"></div>

<script>
// ============================================================
// 1. CONFIGURACIÓN 
// ============================================================
var API_URL = 'http://localhost:8080';

// ============================================================
// 2. FUNCIÓN PARA CONSTRUIR URL 
// ============================================================
function buildUrl(endpoint) {
    if (API_URL.endsWith('/')) {
        return API_URL + endpoint;
    } else {
        return API_URL + '/' + endpoint;
    }
}

// ============================================================
// 3. ESTADO GLOBAL 
// ============================================================
window.currentUser = null;
window.userId = null;

// ============================================================
// 4. HELPER: createElement 
// ============================================================
function createElement(tag, attributes, children) {
    var el, key, child, i;
    
    el = document.createElement(tag);
    
    if (attributes) {
        for (key in attributes) {
            if (key === 'className') {
                el.className = attributes[key];
            } else if (key === 'textContent') {
                el.textContent = attributes[key];
            } else if (key === 'style') {
                for (var styleKey in attributes.style) {
                    el.style[styleKey] = attributes.style[styleKey];
                }
            } else {
                el.setAttribute(key, attributes[key]);
            }
        }
    }
    
    if (children) {
        for (i = 0; i < children.length; i++) {
            child = children[i];
            if (typeof child === 'string') {
                el.appendChild(document.createTextNode(child));
            } else {
                el.appendChild(child);
            }
        }
    }
    
    return el;
}

// ============================================================
// 5. UI HELPERS 
// ============================================================
function showResult(id, msg, type) {
    var el = document.getElementById(id);
    if (!el) return;
    
    el.className = 'result show ' + type;
    
    while (el.firstChild) {
        el.removeChild(el.firstChild);
    }
    
    if (typeof msg === 'object') {
        el.textContent = JSON.stringify(msg, null, 2);
    } else {
        el.textContent = msg;
    }
}

function updateStatus(user, id) {
    var userEl = document.getElementById('statusUser');
    var badgeEl = document.getElementById('statusBadge');
    
    if (user && id) {
        userEl.textContent = user + ' (ID: ' + id + ')';
        userEl.style.color = '#28a745';
        badgeEl.textContent = '✅ Activa';
        badgeEl.className = 'badge badge-online';
        window.currentUser = user;
        window.userId = parseInt(id);
        console.log('✅ Sesión actualizada:', { user: window.currentUser, id: window.userId });
    } else {
        userEl.textContent = 'No autenticado';
        userEl.style.color = '#dc3545';
        badgeEl.textContent = '❌ Sin sesión';
        badgeEl.className = 'badge badge-offline';
        window.currentUser = null;
        window.userId = null;
        console.log('❌ Sesión cerrada');
    }
}

// ============================================================
// 6. RPCWebAPIFetch (REQUERIMIENTO 1 )
// ============================================================
async function RPCWebAPIFetch(endpoint, content, method) {
    method = method || 'POST';
    var headers, options, response, data;
    var url = buildUrl(endpoint);
    
    console.log('📤 === PETICIÓN ===');
    console.log('📍 Endpoint:', endpoint);
    console.log('👤 currentUser:', window.currentUser);
    console.log('🆔 userId:', window.userId);

    headers = {
        'Content-Type': 'application/json'
    };

    if (window.currentUser && window.userId) {
        headers['X-User-Id'] = String(window.userId);
        headers['Authorization'] = 'Bearer ' + window.currentUser;
        console.log('📋 Cabeceras enviadas:', headers);
    } else {
        console.warn('⚠️ No hay sesión activa - cabeceras NO enviadas');
    }

    options = {
        method: method,
        headers: headers
    };

    if (content) {
        options.body = JSON.stringify(content);
    }

    response = await fetch(url, options);
    console.log('📥 Status:', response.status);

    try {
        data = await response.json();
        console.log('📥 Respuesta:', data);
    } catch (e) {
        throw new Error('La respuesta no es JSON válido');
    }

    if (response.ok) {
        return data;
    } else if (response.status === 400) {
        throw new Error(data.exception || 'Error en la solicitud (400)');
    } else if (response.status === 401) {
        throw new Error(data.exception || 'No autenticado (401)');
    } else if (response.status === 403) {
        throw new Error(data.exception || 'Acceso denegado (403)');
    } else if (response.status === 404) {
        throw new Error(data.exception || 'Método no encontrado (404)');
    } else if (response.status === 405) {
        throw new Error(data.exception || 'Método no permitido (405)');
    } else if (response.status === 500) {
        throw new Error(data.exception || 'Error interno del servidor (500)');
    } else {
        throw new Error('Error inesperado (' + response.status + ')');
    }
}

class WCLoginFormView extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.render();
        this.setupEvents();
    }
    
    render() {
        var shadow, style, container, userGroup, passGroup, btnGroup, btnLogin, btnLogout, result;
        
        shadow = this.shadowRoot;
        
        style = document.createElement('style');
        style.textContent = `
            :host { display: block; }
            .form-group { margin-bottom: 10px; }
            .form-group label { display: inline-block; width: 80px; font-weight: bold; font-size: 0.85em; }
            .form-group input { padding: 5px 8px; border: 1px solid #ced4da; border-radius: 4px; width: 160px; }
            .btn-group { display: flex; gap: 5px; margin-top: 8px; }
            .btn-primary { background: #1a73e8; color: white; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }
            .btn-primary:hover { background: #1557b0; }
            .btn-danger { background: #dc3545; color: white; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }
            .btn-danger:hover { background: #bd2130; }
            .result { margin-top: 8px; padding: 8px; border-radius: 4px; display: none; font-size: 0.85em; }
            .result.show { display: block; }
            .result.success { background: #d4edda; color: #155724; }
            .result.error { background: #f8d7da; color: #721c24; }
            .result.info { background: #d1ecf1; color: #0c5460; }
        `;
        shadow.appendChild(style);
        
        container = document.createElement('div');
        
        userGroup = createElement('div', { className: 'form-group' }, [
            createElement('label', { textContent: 'Usuario:' }),
            createElement('input', { id: 'txtUser', type: 'text', value: 'usuarioX' })
        ]);
        container.appendChild(userGroup);
        
        passGroup = createElement('div', { className: 'form-group' }, [
            createElement('label', { textContent: 'Contraseña:' }),
            createElement('input', { id: 'txtPassword', type: 'password', value: '123456' })
        ]);
        container.appendChild(passGroup);
        
        btnGroup = createElement('div', { className: 'btn-group' }, [
            createElement('button', { className: 'btn-primary', id: 'btnLogin', textContent: 'Login' }),
            createElement('button', { className: 'btn-danger', id: 'btnLogout', textContent: 'Logout' })
        ]);
        container.appendChild(btnGroup);
        
        result = createElement('div', { id: 'result', className: 'result' });
        container.appendChild(result);
        
        shadow.appendChild(container);
    }
    
    setupEvents() {
        var btnLogin = this.shadowRoot.getElementById('btnLogin');
        var btnLogout = this.shadowRoot.getElementById('btnLogout');
        
        btnLogin.addEventListener('click', this.handleLogin.bind(this));
        btnLogout.addEventListener('click', this.handleLogout.bind(this));
    }
    
    showResult(msg, type) {
        var el = this.shadowRoot.getElementById('result');
        el.className = 'result show ' + type;
        el.textContent = msg;
    }
    
    async handleLogin() {
        var user = this.shadowRoot.getElementById('txtUser').value;
        var pass = this.shadowRoot.getElementById('txtPassword').value;
        
        if (!user || !pass) {
            this.showResult('❌ Usuario y contraseña requeridos', 'error');
            return;
        }
        
        try {
            var data = await RPCWebAPIFetch('login', { username: user, password: pass });
            if (data.success) {
                this.showResult('✅ ' + data.message, 'success');
                // Disparar evento para actualizar el estado global
                var event = new CustomEvent('login-success', {
                    detail: { username: data.username, userId: data.userId }
                });
                document.dispatchEvent(event);
            } else {
                this.showResult('❌ ' + data.message, 'error');
            }
        } catch (err) {
            this.showResult('❌ ' + err.message, 'error');
        }
    }
    
    async handleLogout() {
        if (!window.currentUser) {
            this.showResult('⚠️ No hay sesión', 'info');
            return;
        }
        
        try {
            var data = await RPCWebAPIFetch('logout');
            this.showResult('✅ ' + data.message, 'success');
            document.dispatchEvent(new CustomEvent('logout-success'));
        } catch (err) {
            this.showResult('❌ ' + err.message, 'error');
        }
    }
}

customElements.define('wc-login-form', WCLoginFormView);

            { path: 'sayHello', label: '/sayHello', className: 'btn-secondary' },

        ];
        
        for (i = 0; i < endpoints.length; i++) {
            btn = createElement('button', {
                className: endpoints[i].className,
                'data-endpoint': endpoints[i].path,
                textContent: endpoints[i].label
            });
            grid.appendChild(btn);
        }
        
        container.appendChild(grid);
        
        result = createElement('div', { id: 'result', className: 'result' });
        container.appendChild(result);
        
        shadow.appendChild(container);
    }
    
    setupEvents() {
        var buttons = this.shadowRoot.querySelectorAll('[data-endpoint]');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].addEventListener('click', this.handleEndpoint.bind(this, buttons[i].dataset.endpoint));
        }
    }
    
    showResult(msg, type) {
        var el = this.shadowRoot.getElementById('result');
        el.className = 'result show ' + type;
        el.textContent = msg;
    }
    
    // === FUNCIÓN CORREGIDA: usa window.currentUser y window.userId ===
    async handleEndpoint(endpoint) {
        console.log('🔍 ENDPOINT CLICKEADO:', endpoint);
        console.log('👤 currentUser (global):', window.currentUser);
        console.log('🆔 userId (global):', window.userId);
        
        // Usar las variables globales

            this.showResult('❌ Inicia sesión primero', 'error');

        if (!window.userId) {
            this.showResult('❌ Error: userId no disponible', 'error');
            return;
        }
        
        try {
            var data = await RPCWebAPIFetch(endpoint);
            this.showResult('✅ ' + data.message, 'success');
        } catch (err) {
            this.showResult('❌ ' + err.message, 'error');
        }
    }
}

function setupEventListeners() {
    document.addEventListener('login-success', function(e) {
        console.log('🔐 Evento login-success recibido:', e.detail);
        updateStatus(e.detail.username, e.detail.userId);
    });
    
    document.addEventListener('logout-success', function() {
        updateStatus(null, null);
    });
    
    document.addEventListener('register-success', function(e) {
        console.log('✅ Usuario registrado:', e.detail.username);
    });
    
    document.getElementById('btnListUsers').addEventListener('click', handleListUsers);
    document.getElementById('btnListGroups').addEventListener('click', handleListGroups);
}

// ============ LOGIN  ============
async function handleLogin() {
    var user, pass, data;
    
    user = document.getElementById('txtUser').value;
    pass = document.getElementById('txtPassword').value;

    if (!user || !pass) {
        showResult('loginResult', '❌ Usuario y contraseña requeridos', 'error');
        return;
    }

    try {
        data = await RPCWebAPIFetch('login', { username: user, password: pass });
        if (data.success) {
            showResult('loginResult', '✅ ' + data.message, 'success');
            updateStatus(data.username, parseInt(data.userId));
        } else {
            showResult('loginResult', '❌ ' + (data.message || 'Login fallido'), 'error');
            updateStatus(null, null);
        }
    } catch (err) {
        showResult('loginResult', '❌ ' + err.message, 'error');
        updateStatus(null, null);
    }
}

// ============ LOGOUT  ============
async function handleLogout() {
    if (!window.currentUser) {
        showResult('loginResult', '⚠️ No hay sesión', 'info');
        return;
    }

    try {
        var data = await RPCWebAPIFetch('logout');
        showResult('loginResult', '✅ ' + data.message, 'success');
        updateStatus(null, null);
    } catch (err) {
        showResult('loginResult', '❌ ' + err.message, 'error');
    }
}

// ============ REGISTRO  ============
async function handleRegister() {
    var user, pass, data;
    
    user = document.getElementById('txtNewUser').value;
    pass = document.getElementById('txtNewPassword').value;

    if (!user || !pass) {
        showResult('registerResult', '❌ Usuario y contraseña requeridos', 'error');
        return;
    }

    try {
        data = await RPCWebAPIFetch('register', { username: user, password: pass });
        showResult('registerResult', '✅ ' + data.message, 'success');

            document.getElementById('txtNewUser').value = '';
            document.getElementById('txtNewPassword').value = '';
        }
    } catch (err) {
        showResult('registerResult', '❌ ' + err.message, 'error');
    }
}
