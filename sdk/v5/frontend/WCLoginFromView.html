<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Login</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="w3-light-grey">
    <wc-login-form-view></wc-login-form-view>
</body>
<script>
// ========== CLASES DE ERROR ==========
class SpecificationError extends Error {
    constructor(data) {
        super("Error de especificación");
        this.data = data;
        this.name = "SpecificationError";
    }
}

class UnauthorizedError extends Error {
    constructor(data) {
        super("No autorizado");
        this.data = data;
        this.name = "UnauthorizedError";
    }
}

class DomainError extends Error {
    constructor(data) {
        super("Error del dominio");
        this.data = data;
        this.name = "DomainError";
    }
}

class ProgramError extends Error {
    constructor(data) {
        super("Error interno del servidor");
        this.data = data;
        this.name = "ProgramError";
    }
}

// ========== FUNCIÓN RPCWebAPIFetch ==========
async function RPCWebAPIFetch(path, body) {
    if (body === undefined) body = {};
    const API = "http://127.0.0.1:3000";
    
    const headers = {
        "Content-Type": "application/json"
    };
    
    const userId = localStorage.getItem("userId");
    const apiKey = localStorage.getItem("apiKey");
    if (userId && apiKey) {
        headers["x-user-id"] = userId;
        headers["x-api-key"] = apiKey;
    }

    try {
        const res = await fetch(API + path, {
            method: "POST",
            headers: headers,
            body: JSON.stringify(body)
        });

        switch (res.status) {
            case 200:
                return await res.json();

            case 400:
                throw new SpecificationError(await res.json());

            case 401:
                throw new UnauthorizedError(await res.json());

            case 422:
                throw new DomainError(await res.json());

            case 500:
                throw new ProgramError(await res.json());

            default:
                throw new Error("Respuesta inesperada del servidor.");
        }
    } catch (error) {
        if (error instanceof SpecificationError || 
            error instanceof UnauthorizedError || 
            error instanceof DomainError || 
            error instanceof ProgramError) {
            throw error;
        }
        throw new Error("Error de red: " + error.message);
    }
}

// ========== FUNCIÓN PARA MANEJAR ERRORES ==========
function handleRPCError(error) {
    if (error instanceof UnauthorizedError) {
        return "No autorizado";
    }

    if (error instanceof DomainError) {
        return error.data.message || error.data.error || "Error en los datos";
    }

    if (error instanceof SpecificationError) {
        return error.data.message || error.data.error || "Error en la solicitud";
    }

    if (error instanceof ProgramError) {
        return "Error interno del servidor";
    }

    return error.message || "Error inesperado";
}

// ========== CREATE ICON ==========
function createIcon(classes) {
    var icon = document.createElement("i");
    if (classes && classes.length > 0) {
        icon.classList.add.apply(icon.classList, classes);
    }
    return icon;
}

function createButton(iconClasses, buttonClasses) {
    var button = document.createElement("button");
    button.type = "button";
    if (buttonClasses) {
        button.classList.add.apply(button.classList, buttonClasses);
    } else {
        button.classList.add("w3-button", "w3-large", "w3-opacity-min");
    }
    if (iconClasses) {
        button.appendChild(createIcon(iconClasses));
    }
    return button;
}

// ========== CREATE LOGIN FORM ==========
function createLoginForm() {
    var container = document.createElement("div");
    var autoWrapper = document.createElement("div");
    var card = document.createElement("div");
    var cardBody = document.createElement("div");
    
    var header = document.createElement("div");
    var logo = document.createElement("img");
    var title = document.createElement("p");
    var titleText = document.createTextNode("Iniciar sesion");
    
    var usernameWrapper = document.createElement("div");
    var usernameInput = document.createElement("input");
    
    var passwordWrapper = document.createElement("div");
    var passwordInput = document.createElement("input");
    
    var checkboxWrapper = document.createElement("div");
    var checkboxContainer = document.createElement("div");
    var checkbox = document.createElement("input");
    var checkboxLabel = document.createElement("label");
    var checkboxText = document.createTextNode(" Aceptar terminos y condiciones");
    
    var submitButton = document.createElement("button");
    var submitText = document.createTextNode("Sign In");
    
    var cardFooter = document.createElement("div");
    var footerP = document.createElement("p");
    var warningSpan = document.createElement("span");
    var warningText = document.createTextNode("Do not have an account? ");
    var registerLink = document.createElement("a");
    var registerText = document.createTextNode(" Sign Up here");

    // Clases y estilos
    container.classList.add("w3-padding-32");
    autoWrapper.classList.add("w3-auto");
    autoWrapper.style.width = "380px";
    card.classList.add("w3-white", "w3-round", "w3-margin-bottom", "w3-border");
    cardBody.classList.add("w3-padding-large");
    header.classList.add("w3-center", "w3-padding-16");
    logo.classList.add("w3-image");
    usernameWrapper.classList.add("w3-margin-bottom");
    usernameInput.classList.add("w3-input", "w3-round", "w3-border");
    passwordWrapper.classList.add("w3-margin-bottom");
    passwordInput.classList.add("w3-input", "w3-round", "w3-border");
    checkboxWrapper.classList.add("w3-margin-bottom");
    checkboxContainer.classList.add("icheck-material-white");
    checkbox.classList.add("w3-check");
    submitButton.classList.add("w3-button", "w3-round", "w3-margin-bottom", "w3-primary", "w3-block");
    cardFooter.classList.add("w3-center", "w3-border-top");
    footerP.classList.add("w3-margin");
    warningSpan.classList.add("w3-text-warning");

    logo.src = "./assets/admin-logo.png";
    logo.alt = "w3mix";
    
    usernameInput.type = "text";
    usernameInput.placeholder = "Enter Username";
    usernameInput.id = "login-username";
    usernameInput.name = "username";
    usernameInput.required = true;
    
    passwordInput.type = "password";
    passwordInput.placeholder = "Enter Password";
    passwordInput.id = "login-password";
    passwordInput.name = "password";
    passwordInput.required = true;
    
    checkbox.type = "checkbox";
    checkbox.id = "user-checkbox-login";
    checkbox.checked = true;
    checkboxLabel.htmlFor = "user-checkbox-login";
    
    submitButton.type = "button";
    submitButton.id = "login-submit";
    registerLink.href = "WCRegisterFormView.html";

    // Ensamblar
    header.appendChild(logo);
    header.appendChild(title);
    title.appendChild(titleText);
    
    usernameWrapper.appendChild(usernameInput);
    passwordWrapper.appendChild(passwordInput);
    
    checkboxLabel.appendChild(checkboxText);
    checkboxContainer.appendChild(checkbox);
    checkboxContainer.appendChild(checkboxLabel);
    checkboxWrapper.appendChild(checkboxContainer);
    
    submitButton.appendChild(submitText);
    
    cardBody.appendChild(header);
    cardBody.appendChild(usernameWrapper);
    cardBody.appendChild(passwordWrapper);
    cardBody.appendChild(checkboxWrapper);
    cardBody.appendChild(submitButton);
    
    warningSpan.appendChild(warningText);
    registerLink.appendChild(registerText);
    footerP.appendChild(warningSpan);
    footerP.appendChild(registerLink);
    cardFooter.appendChild(footerP);
    
    card.appendChild(cardBody);
    card.appendChild(cardFooter);
    autoWrapper.appendChild(card);
    container.appendChild(autoWrapper);

    return container;
}

// ========== WEB COMPONENT ==========
class WCLoginFormView extends HTMLElement {
    constructor() {
        super();

        // 1. Crear el formulario y agregarlo al componente
        this.loginForm = createLoginForm();
        this.appendChild(this.loginForm);

        // 2. Referencias a los inputs y botón
        this._inputs = {
            username: this.querySelector("#login-username"),
            password: this.querySelector("#login-password"),
            remember: this.querySelector("#user-checkbox-login")
        };
        this._submitButton = this.querySelector("#login-submit");

        // 3. Crear mensaje de error 
        this._errorMessage = document.createElement("div");
        this._errorMessage.className = "error-message w3-panel w3-red w3-round";
        this._errorMessage.style.display = "none";
        var cardBody = this.querySelector(".w3-padding-large");
        if (cardBody && this._submitButton) {
            cardBody.insertBefore(this._errorMessage, this._submitButton);
        }

        // 4. Crear indicador de carga 
        this._loadingIndicator = document.createElement("span");
        this._loadingIndicator.textContent = " Cargando...";
        this._loadingIndicator.style.display = "none";
        this._loadingIndicator.style.marginLeft = "10px";
        if (this._submitButton) {
            this._submitButton.appendChild(this._loadingIndicator);
        }

        // 5. Vincular métodos (para eventos)
        this._handleSubmit = this._handleSubmit.bind(this);
        this._handleKeyPress = this._handleKeyPress.bind(this);
    }

    // ---------- CONNECTED CALLBACK ----------
    connectedCallback() {
        // Solo asignar manejadores de eventos
        if (this._submitButton) {
            this._submitButton.addEventListener("click", this._handleSubmit);
        }

        var inputs = [this._inputs.username, this._inputs.password];
        for (var i = 0; i < inputs.length; i++) {
            var input = inputs[i];
            if (input) {
                input.addEventListener("keypress", this._handleKeyPress);
            }
        }
    }

    // ---------- DISCONNECTED CALLBACK ----------
    disconnectedCallback() {
        // Remover todos los eventos
        if (this._submitButton) {
            this._submitButton.removeEventListener("click", this._handleSubmit);
        }

        var inputs = [this._inputs.username, this._inputs.password];
        for (var i = 0; i < inputs.length; i++) {
            var input = inputs[i];
            if (input) {
                input.removeEventListener("keypress", this._handleKeyPress);
            }
        }
    }

    // ---------- MÉTODOS AUXILIARES ----------
    showError(message) {
        if (this._errorMessage) {
            this._errorMessage.textContent = message;
            this._errorMessage.style.display = "block";
        }
    }

    clearError() {
        if (this._errorMessage) {
            this._errorMessage.style.display = "none";
            this._errorMessage.textContent = "";
        }
    }

    setLoading(loading) {
        if (this._submitButton) {
            this._submitButton.disabled = loading;
        }
        if (this._loadingIndicator) {
            this._loadingIndicator.style.display = loading ? "inline" : "none";
        }
    }

    showSuccess(message) {
        var successDiv = document.createElement("div");
        successDiv.className = "w3-panel w3-green w3-round";
        successDiv.textContent = message;
        
        var cardBody = this.querySelector(".w3-padding-large");
        if (cardBody && this._submitButton) {
            var existingMessages = cardBody.querySelectorAll(".w3-panel:not(.error-message)");
            for (var i = 0; i < existingMessages.length; i++) {
                existingMessages[i].remove();
            }
            cardBody.insertBefore(successDiv, this._submitButton);
            
            var self = this;
            setTimeout(function() {
                successDiv.remove();
            }, 3000);
        }
    }

    // ---------- MANEJADOR DEL SUBMIT ----------
    _handleSubmit(event) {
        if (!this._inputs.username || !this._inputs.username.value.trim()) {
            this.showError("Por favor, ingresa tu nombre de usuario");
            return;
        }
        
        if (!this._inputs.password || !this._inputs.password.value) {
            this.showError("Por favor, ingresa tu contraseña");
            return;
        }
        
        this.clearError();
        this.setLoading(true);
        
        var self = this;
        var loginData = {
            username: this._inputs.username.value.trim(),
            password: this._inputs.password.value,
            remember: this._inputs.remember ? this._inputs.remember.checked : false
        };

        RPCWebAPIFetch("/login", loginData)
            .then(function(result) {
                console.log("Login exitoso:", result);
                
                if (result.status && result.result) {
                    localStorage.setItem("userId", result.result.id);
                    localStorage.setItem("apiKey", result.result.apiKey);
                    localStorage.setItem("username", result.result.username);
                }
                
                self.showSuccess("¡Inicio de sesión exitoso!");
                
                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 1500);
            })
            .catch(function(error) {
                console.error("Error en login:", error);
                var errorMessage = handleRPCError(error);
                self.showError(errorMessage);
            })
            .finally(function() {
                self.setLoading(false);
            });
    }

    // ---------- MANEJADOR DE TECLA ENTER ----------
    _handleKeyPress(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            if (this._submitButton) {
                this._submitButton.click();
            }
        }
    }
}

// ========== REGISTRAR EL WEB COMPONENT ==========
customElements.define("wc-login-form-view", WCLoginFormView);
</script>
</html>
